{% if divisions %}
<div class="divisions-list">
    {% for item in divisions %}
    <a href="{% if item.division.event_type == 'poomsae' and not item.division.matches %}/admin/divisions/{{ item.division.id }}/poomsae_results{% else %}/ui/divisions/{{ item.division.id }}/bracket{% endif %}" class="division-btn">
        <div class="division-name">{{ item.division.name }}</div>
        <div class="division-meta">{{ item.status }}</div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="empty-state">No divisions found for this event type.</div>
{% endif %}
