{% set up_disabled = ' disabled' if competitor_index == 0 else '' %}
{% set down_disabled = ' disabled' if competitor_index == (total_competitors - 1) else '' %}
<li style="display: flex; justify-content: space-between; align-items: center; padding: 8px 10px;">
    <span>{{ competitor.name }}{% if competitor.school %} <span style="color: #64748b; font-size: 0.85rem;">({{ competitor.school }})</span>{% endif %}</span>
    <div style="display: flex; gap: 4px;">
        <button{{ up_disabled }} hx-post="/ui/divisions/{{ div_id }}/competitors/{{ competitor.id }}/move"
            hx-vals='{"direction":"up"}' hx-target="#competitor-list" hx-swap="innerHTML"
            style="padding: 2px 8px; font-size: 0.8rem; width: auto; background: #64748b;">&#8593;</button>
            <button{{ down_disabled }} hx-post="/ui/divisions/{{ div_id }}/competitors/{{ competitor.id }}/move"
                hx-vals='{"direction":"down"}' hx-target="#competitor-list" hx-swap="innerHTML"
                style="padding: 2px 8px; font-size: 0.8rem; width: auto; background: #64748b;">&#8595;</button>
                <button class="danger-btn" hx-delete="/ui/divisions/{{ div_id }}/competitors/{{ competitor.id }}"
                    hx-target="#competitor-list" hx-swap="innerHTML"
                    hx-confirm="Remove {{ competitor.name }} from this division?"
                    style="padding: 2px 8px; font-size: 0.8rem; width: auto;">&times;</button>
    </div>
</li>
