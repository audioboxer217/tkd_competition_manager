{% set has_tbd = match.competitor1_id is none or match.competitor2_id is none %}
<div class="match-card" id="match-{{ match.id }}">
    <div class="match-info">
        <strong>Match {{ match.match_number if match.match_number is not none else "Unassigned" }}</strong> &mdash; {{ match.division.name }} ({{ match.round_name }})
    </div>

    <form class="scorekeeper-form" data-has-tbd="{{ 1 if has_tbd else 0 }}">

        <div class="competitor-select">
            <div class="competitor-option">
                <input type="radio" id="win-{{ match.id }}-1" name="winner_id"
                    value="{{ match.competitor1_id if match.competitor1_id is not none else '' }}" {{ "disabled" if has_tbd else "" }}>
                <label for="win-{{ match.id }}-1" class="competitor-label blue-side">
                    Chung (Blue)<br>
                    <span style="color: #0f172a; font-size: 1.5rem;">{{ match.competitor1.name if match.competitor1 else "TBD" }}</span>
                </label>
            </div>

            <div class="competitor-option">
                <input type="radio" id="win-{{ match.id }}-2" name="winner_id"
                    value="{{ match.competitor2_id if match.competitor2_id is not none else '' }}" {{ "disabled" if has_tbd else "" }}>
                <label for="win-{{ match.id }}-2" class="competitor-label red-side">
                    Hong (Red)<br>
                    <span style="color: #0f172a; font-size: 1.5rem;">{{ match.competitor2.name if match.competitor2 else "TBD" }}</span>
                </label>
            </div>
        </div>

        <div class="controls">
            {% if match.status == "In Progress" %}
            <button type="button" class="submit-btn winner-required" disabled {{ 'data-force-disabled="1"' if has_tbd else "" }}
                hx-post="/ui/matches/{{ match.id }}/result" hx-target="#match-{{ match.id }}" hx-swap="outerHTML"
                hx-include="closest form" hx-vals='{"status": "Completed"}'
                hx-confirm="Confirm official result (Normal Win) for Match {{ match.match_number }}? This will advance the bracket.">
                Normal Win
            </button>
            {% else %}
            <button type="button" class="submit-btn" {{ "disabled" if has_tbd else "" }} hx-post="/ui/matches/{{ match.id }}/result"
                hx-target="#match-{{ match.id }}" hx-swap="outerHTML" hx-include="closest form" hx-vals='{"status": "In Progress"}'>
                Start
            </button>
            {% endif %}
            <button type="button" class="submit-btn dsq-btn winner-required" disabled {{ 'data-force-disabled="1"' if has_tbd
                else "" }} hx-post="/ui/matches/{{ match.id }}/result" hx-target="#match-{{ match.id }}" hx-swap="outerHTML"
                hx-include="closest form" hx-vals='{"status": "Disqualification"}'
                hx-confirm="Confirm official result (Disqualification) for Match {{ match.match_number }}? This will advance the bracket.">
                Disqualification
            </button>
        </div>
    </form>
</div>
