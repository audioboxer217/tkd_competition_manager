<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ division.name }} - Results</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #0f172a;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 10px;
            vertical-align: middle;
        }

        .status-badge.pending {
            background: #f1f5f9;
            color: #64748b;
        }

        .status-badge.in-progress {
            background: #dcfce7;
            color: #15803d;
        }

        .status-badge.completed {
            background: #e0e7ff;
            color: #3730a3;
        }

        .btn-back {
            display: inline-block;
            background: #e2e8f0;
            color: #475569;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-decoration: none;
            border: 1px solid #cbd5e1;
        }

        .btn-back:hover {
            background: #cbd5e1;
            color: #0f172a;
        }
    </style>
</head>

<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="/results" class="btn-back">&larr; Back to Results</a>
        <a href="/" class="btn-back">Live View</a>
    </div>

    <div class="container">
        <div class="header">
            <h1 style="margin: 0 0 6px 0;">{{ division.name }}</h1>
            <span class="status-badge {% if division.event_status == 'In Progress' %}in-progress{% elif division.event_status == 'Completed' %}completed{% else %}pending{% endif %}">
                {{ division.event_status }}
            </span>
            {% if division.ring_id %}
            <p style="color: #64748b; margin: 8px 0 0 0; font-size: 0.9rem;">
                Auto-updating every 15 seconds&hellip;
            </p>
            {% endif %}
        </div>

        <div id="poomsae-placements-container"
             hx-get="/ui/divisions/{{ division.id }}/poomsae_placements_fragment"
             hx-trigger="load, every 15s"
             hx-swap="outerHTML">
            <p style="text-align: center; color: #64748b;">Loading results&hellip;</p>
        </div>
    </div>

</body>

</html>
