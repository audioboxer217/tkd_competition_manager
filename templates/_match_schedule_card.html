<div class="match-card" id="match-{{ match.id }}">
    <div class="match-body">
        <div>
            <font style="color: #252ceb; font-weight: bold;">Chung</font>: {{ match.competitor1.name if
            match.competitor1 else "TBD" }}
        </div>
        <div>
            <font style="color: #eb2525; font-weight: bold;">Hong</font>: {{ match.competitor2.name if match.competitor2
            else "TBD" }}
        </div>
    </div>

    <div class="schedule-form">
        {% if error_message %}
        <div style="margin-bottom: 8px; color: #dc2626; font-weight: bold;">
            {{ error_message }}
        </div>
        {% else %}
        <div style="margin-bottom: 8px; font-weight: bold; color: #2563eb;">
            Scheduled: {{ scheduled_label }}
        </div>
        {% endif %}
        <form hx-put="/matches/{{ match.id }}/schedule" hx-target="#match-{{ match.id }}" hx-swap="outerHTML"
            style="display: flex; gap: 5px;">
            <select name="ring_id" required style="flex: 1;">
                <option value="">Select Ring...</option>
                {% for ring in rings %}
                <option value="{{ ring.id }}" {% if selected_ring_id==ring.id %}selected{% endif %}>{{ ring.name }}
                </option>
                {% endfor %}
            </select>
            <input type="number" name="ring_sequence" value="{{ ring_sequence_value }}" required style="width: 80px;">
            <button type="submit" class="save-btn">Save</button>
        </form>
    </div>
</div>
