<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ ring.name }} - Scorekeeper</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 15px;
        }

        .header {
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .event-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .event-tab {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #e2e8f0;
            color: #475569;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .event-tab:hover {
            background: #cbd5e1;
            color: #334155;
        }

        .event-tab.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .event-tab.active:hover {
            background: #1d4ed8;
            color: white;
        }

        .match-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #3b82f6;
        }

        .match-info {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Big touch-friendly competitor selection */
        .competitor-select {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .competitor-option {
            flex: 1;
            position: relative;
        }

        .competitor-option input[type="radio"] {
            display: none;
        }

        .competitor-label {
            display: block;
            padding: 20px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }

        /* Highlight blue/red typical of TKD */
        .competitor-option input[type="radio"]:checked+.competitor-label.blue-side {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
        }

        .competitor-option input[type="radio"]:checked+.competitor-label.red-side {
            background: #fef2f2;
            border-color: #ef4444;
            color: #b91c1c;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }

        select {
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            flex: 1;
        }

        button.submit-btn {
            background: #10b981;
            color: white;
            border: none;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
        }

        button.submit-btn:hover {
            background: #059669;
        }

        button.dsq-btn {
            background: #f59e0b;
            margin-left: auto;
        }

        button.dsq-btn:hover {
            background: #d97706;
        }

        button.submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #64748b;
            font-size: 1.2rem;
            background: white;
            border-radius: 8px;
        }

        @keyframes resultNotificationFade {
            0%, 93.75% { opacity: 1; }
            100% { opacity: 0; }
        }

        .result-notification-content {
            padding: 20px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #34d399;
            animation: resultNotificationFade 16s forwards;
        }

        .competitor-name {
            color: #0f172a;
            font-size: 1.5rem;
        }

        a.back-link {
            color: #64748b;
            text-decoration: none;
        }

        a.back-link:hover {
            color: #0f172a;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .competitor-label {
                padding: 12px 8px;
                font-size: 1rem;
            }

            .competitor-label .competitor-name {
                font-size: 1.1rem;
            }

            .controls {
                flex-wrap: wrap;
            }

            .controls button {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token() }}"}'>

    <div class="header">
        <span>Scorekeeper Console</span>
        <h1>{{ ring.name }} - {{ event_type|capitalize }}</h1>
        <a href="/admin" class="back-link">&larr; Back to Admin</a>
    </div>
    <div class="event-tabs">
        <a href="/ring/{{ ring.id }}/scorekeeper?event_type=kyorugi"
            class="event-tab {{ 'active' if event_type == 'kyorugi' else '' }}">Kyorugi</a>
        <a href="/ring/{{ ring.id }}/scorekeeper?event_type=poomsae"
            class="event-tab {{ 'active' if event_type == 'poomsae' else '' }}">Poomsae</a>
    </div>
    <div id="result-notification"></div>
    <div id="matches-container">
        {% include 'scorekeeper_matches_fragment.html' %}
    </div>

    {% if event_type == 'poomsae' %}
    <div id="poomsae-divisions-container"
         hx-get="/ui/rings/{{ ring.id }}/poomsae_divisions"
         hx-trigger="load"
         hx-swap="innerHTML"
         style="margin-top: 20px;">
        <p style="text-align: center; color: #64748b;">Loading poomsae divisions&hellip;</p>
    </div>
    {% endif %}

    {% include '_confirm_modal.html' %}
    {% include '_error_modal.html' %}

    <script>
        function initScorekeeperForms(root) {
            const scope = root || document;
            const forms = scope.querySelectorAll('.scorekeeper-form');

            forms.forEach((form) => {
                if (form.dataset.bound === '1') {
                    return;
                }
                form.dataset.bound = '1';

                const hasTbd = form.dataset.hasTbd === '1';
                const winnerRequiredButtons = form.querySelectorAll('.winner-required');

                const updateButtons = () => {
                    if (hasTbd) {
                        winnerRequiredButtons.forEach((btn) => {
                            btn.disabled = true;
                        });
                        return;
                    }

                    const winnerSelected = form.querySelector('input[name="winner_id"]:checked') !== null;
                    winnerRequiredButtons.forEach((btn) => {
                        btn.disabled = !winnerSelected;
                    });
                };

                form.addEventListener('change', updateButtons);
                updateButtons();
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            initScorekeeperForms(document);
        });

        document.body.addEventListener('htmx:afterSwap', function (event) {
            initScorekeeperForms(event.target);
        });

        document.body.addEventListener('htmx:afterSettle', function () {
            var container = document.getElementById('matches-container');
            if (container) {
                initScorekeeperForms(container);
            }
        });
    </script>

</body>

</html>
