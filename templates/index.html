<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Live View</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #0f172a;
        }

        .event-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #e2e8f0;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tab-btn:hover {
            background: #cbd5e1;
        }

        .tab-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .tab-btn.active:hover {
            background: #1d4ed8;
        }

        /* Grid layout for Rings */
        .ring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .ring-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .ring-card h2 {
            margin-top: 0;
            color: #2563eb;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .match-item {
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
        }

        .match-item:last-child {
            border-bottom: none;
        }

        .status-in-progress {
            color: #059669;
            font-weight: bold;
        }

        .status-pending {
            color: #64748b;
        }

        .status-completed {
            color: #94a3b8;
            font-style: italic;
        }

        .match-item-completed {
            background: #f8fafc;
            border-left: 3px solid #e2e8f0;
            padding-left: 8px;
        }

        .match-competitors {
            word-break: normal;
            overflow-wrap: break-word;
        }

        .result-indicator {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 2px;
            vertical-align: middle;
        }

        .result-win {
            background: #dcfce7;
            color: #15803d;
        }

        .result-loss {
            background: #fee2e2;
            color: #b91c1c;
        }

        .result-neutral {
            background: #f1f5f9;
            color: #64748b;
        }

        a {
            color: #0f172a;
            text-decoration: none;
        }

        a:hover {
            color: #64748b;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-admin-login {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .btn-admin-login:hover {
            background: #1d4ed8;
            color: white;
        }

        .btn-secondary {
            display: inline-block;
            background: #e2e8f0;
            color: #475569;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-decoration: none;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
            color: #0f172a;
        }

    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="/results" class="btn-secondary">View Results</a>
        <a href="/admin" class="btn-admin-login">Admin Console</a>
    </nav>

    <div class="header">
        <h1>Live Tournament Status</h1>
        <p>Auto-updating every 15 seconds...</p>
    </div>

    <div class="event-tabs">
        <button id="tab-kyorugi" class="tab-btn active" type="button" onclick="switchLiveEvent('kyorugi')">Kyorugi</button>
        <button id="tab-poomsae" class="tab-btn" type="button" onclick="switchLiveEvent('poomsae')">Poomsae/Breaking</button>
    </div>
    
    <div id="ring-grid" class="ring-grid" hx-get="/ui/public_rings?event_type=kyorugi" hx-trigger="load"
        hx-swap="innerHTML">
        <div style="text-align: center; width: 100%; color: #64748b;">Loading live rings...</div>
    </div>

    <script>
        const LIVE_EVENT_STORAGE_KEY = 'liveViewEventType';
        const VALID_EVENT_TYPES = ['kyorugi', 'poomsae'];

        function getCurrentLiveEvent() {
            const activeTab = document.querySelector('.tab-btn.active');
            if (!activeTab) {
                return 'kyorugi';
            }
            return activeTab.id.replace('tab-', '');
        }

        function refreshLiveView(eventType) {
            htmx.ajax('GET', '/ui/public_rings?event_type=' + eventType, { target: '#ring-grid', swap: 'innerHTML' });
        }

        function applyLiveEvent(eventType) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + eventType).classList.add('active');

            const ringGrid = document.getElementById('ring-grid');
            ringGrid.setAttribute('hx-get', '/ui/public_rings?event_type=' + eventType);
        }

        function switchLiveEvent(eventType) {
            if (!VALID_EVENT_TYPES.includes(eventType)) {
                return;
            }
            localStorage.setItem(LIVE_EVENT_STORAGE_KEY, eventType);
            applyLiveEvent(eventType);
            refreshLiveView(eventType);
        }

        (function initializeLiveEventTab() {
            const savedEventType = localStorage.getItem(LIVE_EVENT_STORAGE_KEY);
            const initialEventType = VALID_EVENT_TYPES.includes(savedEventType) ? savedEventType : 'kyorugi';
            applyLiveEvent(initialEventType);
        })();

        setInterval(function () {
            refreshLiveView(getCurrentLiveEvent());
        }, 15000);
    </script>

</body>

</html>
